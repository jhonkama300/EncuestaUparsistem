<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login • Firebase + esbuild</title>
    <style>
      body { font-family: system-ui, Arial, sans-serif; margin: 2rem; }
      .card { max-width: 420px; margin: 0 auto; padding: 1rem 1.25rem; border: 1px solid #e5e7eb; border-radius: 12px; }
      .row { display: flex; gap: .5rem; margin: .5rem 0; }
      input { width: 100%; padding: .6rem .75rem; border: 1px solid #d1d5db; border-radius: 8px; }
      button { padding: .6rem .8rem; border: 1px solid #d1d5db; border-radius: 8px; background: #111827; color: #fff; cursor: pointer; }
      button.ghost { background: #fff; color: #111827; }
      .muted { color: #6b7280; font-size: .9rem; }
      .hidden { display: none; }
      .divider { text-align: center; color: #9ca3af; margin: .75rem 0; }
    </style>
  </head>
  <body>
    <div class="card">
      <section id="auth-view">
        <h1>Iniciar sesión</h1>
        <div class="row"><input id="email" type="email" placeholder="Correo" /></div>
        <div class="row"><input id="password" type="password" placeholder="Contraseña" /></div>
        <div class="row">
          <button id="login-btn">Entrar</button>
          <button id="register-btn" class="ghost">Crear cuenta</button>
        </div>
        <div class="divider">— o —</div>
        <div class="row">
          <button id="google-btn">Continuar con Google</button>
        </div>
        <p id="auth-error" class="muted"></p>
      </section>
      <section id="app-view" class="hidden">
        <h1>¡Hola! <span id="user-email"></span></h1>
        <p class="muted" id="user-uid"></p>
        <div class="row">
          <button id="logout-btn" class="ghost">Cerrar sesión</button>
        </div>
      </section>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
